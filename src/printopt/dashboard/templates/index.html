<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>printopt</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>printopt</h1>
        <span id="connection-status">disconnected</span>
    </header>
    <div id="layout">
        <aside id="sidebar">
            <h3>Printer</h3>
            <div id="printer-status">Waiting for data...</div>
            <h3>Plugins</h3>
            <div id="plugin-list"></div>
        </aside>
        <main id="main-panel">
            <div id="plugin-tabs"></div>
            <div id="panel-vibration" class="plugin-panel" style="display:none">
                <h2>Vibration Analysis</h2>
                <div class="panel-actions">
                    <button class="action-btn" id="btn-vib-analyze" onclick="doVibAnalyze(this)">Run Analysis</button>
                </div>
                <div id="vib-status">No analysis data yet.</div>
                <canvas id="vib-canvas" width="800" height="400"></canvas>
            </div>
            <div id="panel-flow" class="plugin-panel" style="display:none">
                <h2>Flow Compensation</h2>
                <div class="panel-actions">
                    <button class="action-btn action-on" id="btn-flow-enable" onclick="sendAction('enable_flow')">Enable</button>
                    <button class="action-btn action-off" id="btn-flow-disable" onclick="sendAction('disable_flow')">Disable</button>
                </div>
                <div id="flow-stats"></div>
                <div id="flow-timeline"></div>
                <div id="flow-log"></div>
            </div>
            <div id="panel-thermal" class="plugin-panel" style="display:none">
                <h2>Thermal Simulation</h2>
                <div class="panel-actions">
                    <button class="action-btn action-on" id="btn-thermal-enable" onclick="sendAction('enable_thermal')">Enable</button>
                    <button class="action-btn action-off" id="btn-thermal-disable" onclick="sendAction('disable_thermal')">Disable</button>
                </div>
                <div id="thermal-stats"></div>
                <canvas id="thermal-canvas" width="500" height="500"></canvas>
                <div id="thermal-warnings"></div>
            </div>
            <div id="panel-none" class="plugin-panel">
                <p>Select a plugin from the sidebar to view its dashboard.</p>
            </div>
        </main>
    </div>
    <footer>
        <button id="btn-kill">Kill All Compensation</button>
        <button id="btn-reset">Reset Compensation</button>
    </footer>
    <script src="/static/main.js"></script>
</body>
</html>
