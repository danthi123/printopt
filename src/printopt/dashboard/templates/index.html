<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>printopt</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>printopt</h1>
        <span id="connection-status">disconnected</span>
    </header>
    <div id="layout">
        <aside id="sidebar">
            <h3>Printer</h3>
            <div id="printer-status">Waiting for data...</div>
            <h3>Printer Info</h3>
            <div id="printer-info">Not connected</div>
            <h3>Plugins</h3>
            <div id="plugin-list"></div>
        </aside>
        <main id="main-panel">
            <div id="panel-settings" class="plugin-panel">
                <h2>Settings</h2>
                <div class="settings-grid">
                    <div class="settings-section">
                        <h3>Printer Connection</h3>
                        <div class="setting-row">
                            <label for="setting-printer-ip">Printer IP</label>
                            <input type="text" id="setting-printer-ip" placeholder="192.168.0.248">
                        </div>
                        <div class="setting-row">
                            <label for="setting-printer-port">Port</label>
                            <input type="number" id="setting-printer-port" value="7125" min="1" max="65535">
                        </div>
                        <div class="setting-row">
                            <button class="action-btn" id="btn-connect">Connect</button>
                            <button class="action-btn action-off" id="btn-disconnect">Disconnect</button>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>Flow Compensation</h3>
                        <div class="setting-row">
                            <label for="setting-baseline-pa">Baseline PA</label>
                            <input type="number" id="setting-baseline-pa" value="0.04" step="0.005" min="0" max="1">
                        </div>
                        <div class="setting-row">
                            <label for="setting-corner-boost">Corner PA Boost</label>
                            <input type="number" id="setting-corner-boost" value="1.3" step="0.1" min="1" max="3">
                        </div>
                        <div class="setting-row">
                            <label for="setting-corner-threshold">Corner Angle Threshold</label>
                            <input type="number" id="setting-corner-threshold" value="60" step="5" min="10" max="150">
                        </div>
                        <div class="setting-row">
                            <label for="setting-bridge-flow">Bridge Flow</label>
                            <input type="number" id="setting-bridge-flow" value="0.95" step="0.05" min="0.5" max="1.0">
                        </div>
                        <div class="setting-row">
                            <label for="setting-bridge-fan">Bridge Fan %</label>
                            <input type="number" id="setting-bridge-fan" value="70" step="5" min="0" max="100">
                        </div>
                        <div class="setting-row">
                            <label for="setting-thin-wall-speed">Thin Wall Speed</label>
                            <input type="number" id="setting-thin-wall-speed" value="0.80" step="0.05" min="0.3" max="1.0">
                        </div>
                        <div class="setting-row">
                            <label for="setting-small-perim-speed">Small Perimeter Speed</label>
                            <input type="number" id="setting-small-perim-speed" value="0.70" step="0.05" min="0.3" max="1.0">
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>Thermal Simulation</h3>
                        <div class="setting-row">
                            <label for="setting-material">Material</label>
                            <select id="setting-material">
                                <option value="pla">PLA</option>
                                <option value="petg" selected>PETG</option>
                                <option value="abs">ABS</option>
                                <option value="asa">ASA</option>
                                <option value="tpu">TPU</option>
                            </select>
                        </div>
                        <div class="setting-row">
                            <label for="setting-grid-resolution">Grid Resolution</label>
                            <select id="setting-grid-resolution">
                                <option value="0.5">0.5mm (GPU)</option>
                                <option value="1.0" selected>1.0mm</option>
                                <option value="2.0">2.0mm (fast)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="setting-row" style="margin-top: 12px;">
                    <button class="action-btn action-on" id="btn-save-settings">Save Settings</button>
                </div>
            </div>
            <div class="panel-divider"></div>
            <div id="panel-vibration" class="plugin-panel">
                <h2>Vibration Analysis</h2>
                <div class="panel-actions">
                    <button class="action-btn" id="btn-vib-analyze">Run Analysis</button>
                </div>
                <div id="vib-status">No analysis data yet.</div>
                <canvas id="vib-canvas" width="800" height="400"></canvas>
            </div>
            <div class="panel-divider"></div>
            <div id="panel-flow" class="plugin-panel">
                <h2>Flow Compensation</h2>
                <div class="panel-actions">
                    <button class="action-btn action-on" id="btn-flow-toggle">Enabled</button>
                </div>
                <div id="flow-stats"></div>
                <div id="flow-timeline"></div>
                <div id="flow-log"></div>
            </div>
            <div class="panel-divider"></div>
            <div id="panel-thermal" class="plugin-panel">
                <h2>Thermal Simulation</h2>
                <div class="panel-actions">
                    <button class="action-btn action-on" id="btn-thermal-toggle">Enabled</button>
                </div>
                <div id="thermal-stats"></div>
                <canvas id="thermal-canvas" width="800" height="800"></canvas>
                <div id="thermal-warnings"></div>
            </div>
        </main>
    </div>
    <footer>
        <button id="btn-kill">Kill All Compensation</button>
        <button id="btn-reset">Reset Compensation</button>
    </footer>
    <script src="/static/main.js"></script>
    <script>
    document.body.addEventListener('click', function(e) {
        var t = e.target;
        if (!t.matches || !t.matches('button')) return;
        var id = t.id;
        if (id === 'btn-vib-analyze') { doVibAnalyze(t); }
        else if (id === 'btn-flow-toggle') { togglePlugin('flow', t); }
        else if (id === 'btn-thermal-toggle') { togglePlugin('thermal', t); }
        else if (id === 'btn-save-settings') { saveSettings(); }
        else if (id === 'btn-connect') { sendAction('connect_printer'); }
        else if (id === 'btn-disconnect') { sendAction('disconnect_printer'); }
    });
    </script>
</body>
</html>
